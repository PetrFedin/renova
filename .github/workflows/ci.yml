name: CI
on: [push, pull_request]
jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_USER: renova, POSTGRES_PASSWORD: renova, POSTGRES_DB: renova }
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install backend + start API + e2e-smoke
        working-directory: backend
        run: |
          set -euo pipefail
          pip install poetry
          poetry install --no-interaction
          poetry run pip install fpdf2 alembic
          export ENVIRONMENT=development
          export DATABASE_URL=sqlite+aiosqlite:///./ci.db
          export PUBLIC_BASE_URL=http://127.0.0.1:8100
          export SECRET_KEY=ci-secret-key-at-least-16
          poetry run uvicorn app.main:app --host 127.0.0.1 --port 8100 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8100/health >/dev/null; then
              echo "API ready"
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "API failed to start"
              exit 1
            fi
          done
          bash ../scripts/e2e-smoke.sh
      - name: Alembic on Postgres service (smoke)
        working-directory: backend
        env:
          ENVIRONMENT: staging
          DATABASE_URL: postgresql+asyncpg://renova:renova@127.0.0.1:5433/renova
          PUBLIC_BASE_URL: https://ci-staging.example.com
          SECRET_KEY: ci-staging-secret-key-32chars!!
          ALLOW_CREATE_ALL: "false"
          ALLOW_DEMO_SEED: "false"
        run: |
          set -euo pipefail
          poetry run python -m alembic upgrade head

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: API Playwright (ci-playwright api)
        run: |
          set -euo pipefail
          pip install poetry
          cd backend
          poetry install --no-interaction
          poetry run pip install fpdf2 alembic
          cd ..
          npm ci && npx playwright install chromium
          bash scripts/assert-e2e-bearer.sh
          bash scripts/ci-playwright.sh api

  chat-unread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Visibility contract
        run: npx tsx apps/mobile/lib/domain/screenVisibility.test.ts
      - name: Mark-read visibility contract
        run: npx tsx apps/mobile/lib/domain/canMarkChatRead.test.ts
      - name: Active-thread unread contract
        run: npx tsx apps/mobile/lib/domain/activeThreadUnread.test.ts
      - name: Mark-read policy contract
        run: npx tsx apps/mobile/lib/domain/markThreadReadPolicy.test.ts
      - name: Mark-read idempotency contract
        run: npx tsx apps/mobile/lib/markThreadRead.idempotency.test.ts
      - name: Atomic unread snapshot contract
        run: npx tsx apps/mobile/lib/domain/chatUnreadSnapshot.test.ts
      - name: Chat sync orchestrator contract
        run: npx tsx apps/mobile/lib/chatSync/chatSync.test.ts
      - name: Unread scope contract
        run: npx tsx apps/mobile/lib/domain/unreadScope.test.ts
      - name: Russian pluralization contract
        run: npx tsx apps/mobile/lib/i18n/ruPlural.test.ts
      - name: Navigation badge semantics contract
        run: npx tsx apps/mobile/lib/domain/moreMenuA11y.w77.test.ts
      - name: Backend unread contracts
        working-directory: backend
        run: |
          set -euo pipefail
          pip install poetry
          poetry install --no-interaction
          poetry run pytest tests/test_chat_read_after_visible.py tests/test_chat_unread_snapshot.py -q
