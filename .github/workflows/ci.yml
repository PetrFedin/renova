name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required: install, secret scan, unit/env/sentry, migration heads, EAS config
  quality:
    name: Quality (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Secret scan (required)
        run: bash scripts/secret-scan.sh

      - name: Workflow YAML syntax
        run: ruby -ryaml -e 'Dir[".github/workflows/*.yml"].each { |f| YAML.load_stream(File.read(f)); puts "YAML OK #{f}" }'


      - name: Install JS (lockfile)
        run: npm ci

      - name: EAS / build config validation
        run: npm run testflight:eas

      - name: Mobile env + Sentry unit tests
        run: |
          set -euo pipefail
          npx tsx apps/mobile/lib/envSchema.w150.test.ts
          npx tsx apps/mobile/lib/sentrySanitize.w150.test.ts
          npx tsx apps/mobile/lib/oauthScaffold.w145.test.ts

      - name: Backend Poetry + env/sentry tests
        working-directory: backend
        run: |
          set -euo pipefail
          pip install poetry
          poetry install --no-interaction
          poetry run pip install fpdf2 alembic
          poetry run pytest tests/test_environment_guards.py tests/test_env_schema.py tests/test_sentry_sanitize.py -q
          HEADS="$(poetry run alembic heads | wc -l | tr -d ' ')"
          echo "alembic heads=$HEADS"
          test "$HEADS" = "1"

  # Informational: mobile typecheck noise (TS2786/TS2607 gated baseline)
  typecheck-mobile:
    name: Mobile typecheck (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: typecheck mobile (soft baseline)
        run: bash scripts/typecheck-mobile.sh

  e2e:
    name: E2E smoke + Alembic Postgres (required)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_USER: renova, POSTGRES_PASSWORD: renova, POSTGRES_DB: renova }
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend + start API + e2e-smoke
        working-directory: backend
        run: |
          set -euo pipefail
          pip install poetry
          poetry install --no-interaction
          poetry run pip install fpdf2 alembic
          export ENVIRONMENT=development
          export DATABASE_URL=sqlite+aiosqlite:///./ci.db
          export PUBLIC_BASE_URL=http://127.0.0.1:8100
          export SECRET_KEY=ci-secret-key-at-least-16
          poetry run uvicorn app.main:app --host 127.0.0.1 --port 8100 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8100/health >/dev/null; then
              echo "API ready"
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "API failed to start"
              exit 1
            fi
          done
          bash ../scripts/e2e-smoke.sh
      - name: Alembic on Postgres service (smoke)
        working-directory: backend
        env:
          ENVIRONMENT: staging
          DATABASE_URL: postgresql+asyncpg://renova:renova@127.0.0.1:5433/renova
          PUBLIC_BASE_URL: https://ci-staging.example.com
          SECRET_KEY: ci-staging-secret-key-32chars!!
          ALLOW_CREATE_ALL: "false"
          ALLOW_DEMO_SEED: "false"
          # CI synthetic — not a production host approval
          SENTRY_APPROVED_WITHOUT_DSN: "true"
        run: |
          set -euo pipefail
          poetry run python -m alembic upgrade head

  playwright:
    name: Playwright API (required)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: API Playwright (ci-playwright api)
        run: |
          set -euo pipefail
          pip install poetry
          cd backend
          poetry install --no-interaction
          poetry run pip install fpdf2 alembic
          cd ..
          npm ci
          npx playwright install chromium
          bash scripts/assert-e2e-bearer.sh
          bash scripts/ci-playwright.sh api
