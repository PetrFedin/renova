name: EAS Build & Submit
on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile (eas.json)
        required: true
        default: testflight
        type: choice
        options:
          - testflight
          - preview
          - production
      platform:
        description: Target platform
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all
      submit:
        description: Submit to store after build
        required: false
        default: false
        type: boolean

jobs:
  preflight-and-build:
    runs-on: ubuntu-latest
    # workflow_dispatch only — still guard if trigger set expands later
    if: github.event_name == 'workflow_dispatch' && github.repository == github.event.repository.full_name
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Repo preflight
        run: bash scripts/testflight-preflight.sh --ci
      - name: EAS build and optional submit
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::warning::EXPO_TOKEN not set — skipping EAS build/submit"
            echo "See docs/TESTFLIGHT-PREP-RUNBOOK.md"
            exit 0
          fi
          npm ci
          cd apps/mobile
          npx eas-cli@latest build \
            --platform "${{ inputs.platform }}" \
            --profile "${{ inputs.profile }}" \
            --non-interactive \
            --no-wait
          if [ "${{ inputs.submit }}" = "true" ]; then
            SUBMIT_PROFILE="${{ inputs.profile }}"
            if [ "$SUBMIT_PROFILE" = "preview" ]; then SUBMIT_PROFILE="testflight"; fi
            npx eas-cli@latest submit \
              --platform ios \
              --profile "$SUBMIT_PROFILE" \
              --non-interactive \
              --latest
          fi
