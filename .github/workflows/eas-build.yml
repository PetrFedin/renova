name: EAS Build & Submit
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with: { eas-version: latest, token: ${{ secrets.EXPO_TOKEN }}
      - run: cd apps/mobile && npx eas build --platform all --non-interactive
      - run: cd apps/mobile && npx eas submit --platform ios --non-interactive --latest
      - run: cd apps/mobile && npx eas submit --platform android --non-interactive --latest
