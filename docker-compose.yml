# Renova local infra.
# Staging smoke uses: docker compose -f docker-compose.staging.yml up -d
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: renova
      POSTGRES_PASSWORD: renova
      POSTGRES_DB: renova
    ports:
      - "5433:5432"
    volumes:
      - renova_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renova -d renova"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: renova
      MINIO_ROOT_PASSWORD: renova123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - renova_minio:/data

  # Optional observability (explicit profile)
  otel-collector:
    profiles: ["obs"]
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./infra/otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4318:4318"

  jaeger:
    profiles: ["obs"]
    image: jaegertracing/all-in-one:latest
    ports: ["16686:16686", "4317:4317"]

  grafana:
    profiles: ["obs"]
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: renova
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

volumes:
  renova_pg:
  renova_minio:
